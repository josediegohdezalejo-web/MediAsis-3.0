name: MediAsis Android Build

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  FLUTTER_VERSION: '3.19.0'

jobs:
  # Análisis y pruebas
  analyze:
    name: Analyze & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Get Dependencies
        run: flutter pub get

      - name: Analyze Code
        run: flutter analyze

      - name: Check Formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Run Tests
        run: flutter test --coverage

      - name: Upload Coverage
        uses: codecov/codecov-action@v3
        with:
          files: coverage/lcov.info

  # Build de Android
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: analyze
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Get Dependencies
        run: flutter pub get

      - name: Build APK
        run: |
          flutter build apk --release
          flutter build apk --release --split-per-abi

      - name: Build App Bundle (AAB)
        run: flutter build appbundle --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: mediasis-apk
          path: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            build/app/outputs/flutter-apk/app-x86_64-release.apk

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: mediasis-aab
          path: build/app/outputs/bundle/release/app-release.aab

  # Build de Debug para testing
  build-debug:
    name: Build Debug APK
    runs-on: ubuntu-latest
    needs: analyze
    if: github.ref == 'refs/heads/develop'
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Get Dependencies
        run: flutter pub get

      - name: Build Debug APK
        run: flutter build apk --debug

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: mediasis-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk

  # Crear Release
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build-android
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: mediasis-apk
          path: apks/

      - name: Download AAB
        uses: actions/download-artifact@v4
        with:
          name: mediasis-aab
          path: aab/

      - name: Get Version
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: MediAsis v${{ steps.get_version.outputs.VERSION }}
          body: |
            ## 🏥 MediAsis v${{ steps.get_version.outputs.VERSION }}
            
            ### Nueva versión de MediAsis - Tu Asistencia Médica Integral
            
            ### 📱 Descargas
            - **APK Universal**: `app-release.apk`
            - **APK ARM64**: `app-arm64-v8a-release.apk` (Recomendado para la mayoría de dispositivos)
            - **APK ARM v7**: `app-armeabi-v7a-release.apk`
            - **APK x86_64**: `app-x86_64-release.apk`
            - **AAB**: `app-release.aab` (Para Google Play Store)
            
            ### 📋 Requisitos
            - Android 5.0 (API 21) o superior
            - ~50MB de espacio disponible
            
            ### 🔄 Cambios en esta versión
            Ver [CHANGELOG.md](CHANGELOG.md) para detalles completos.
          files: |
            apks/app-release.apk
            apks/app-armeabi-v7a-release.apk
            apks/app-arm64-v8a-release.apk
            apks/app-x86_64-release.apk
            aab/app-release.aab
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
