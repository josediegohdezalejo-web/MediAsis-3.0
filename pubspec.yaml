name: mediasis
description: "MediAsis - Tu Asistencia Médica Integral. Aplicación para gestión de historias clínicas y consultas médicas."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  
  # Estado y gestión de datos
  provider: ^6.1.1
  
  # Base de datos local
  sqflite: ^2.3.0
  path: ^1.8.3
  path_provider: ^2.1.1
  
  # Utilidades
  intl: ^0.18.1
  uuid: ^4.2.1
  
  # UI Components
  cupertino_icons: ^1.0.6
  flutter_slidable: ^3.0.1
  shimmer: ^3.0.0
  flutter_animate: ^4.3.0
  
  # Icons
  font_awesome_flutter: ^10.6.0
  
  # PDF y exportación (opcional para futuras versiones)
  # pdf: ^3.10.7
  # printing: ^5.11.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/logo.png"
  adaptive_icon_background: "#0066A8"
  adaptive_icon_foreground: "assets/images/logo.png"

flutter:
  uses-material-design: true
  generate: true
  
  assets:
    - assets/images/
